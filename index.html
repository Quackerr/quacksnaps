<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuackSnap Photobooth</title>
    
    <style>
        /* --- 2A: GLOBAL SETUP --- */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #050508; /* Deep void background */
            color: #E4E5E8; /* Full Moon text color */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* --- 2B: MENU SCREEN STYLES --- */
        #main-menu {
            text-align: center;
            background: #252630; 
            padding: 4rem 3rem;
            border-radius: 12px;
            border: 1px solid #3a3c4a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.9);
            max-width: 400px;
            width: 100%;
        }
        #main-menu h1 {
            color: #E4E5E8;
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        #main-menu p {
            color: #9a9ca6;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* --- NEW MENU AESTHETICS --- */
        .moon-title {
            color: #E4E5E8;
            font-size: 3rem; /* Slightly larger and more elegant */
            margin: 0 0 0.5rem 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(228, 229, 232, 0.3); /* Soft lunar glow */
        }
        
        .welcome-text {
            color: #b5b7c0; /* A warmer, brighter grey than before */
            margin-bottom: 2.5rem;
            font-size: 1.15rem;
            line-height: 1.5;
        }

        /* The Breathing Glow Animation */
        @keyframes bloodMoonPulse {
            0% { box-shadow: 0 0 15px rgba(161, 29, 42, 0.4); }
            50% { box-shadow: 0 0 30px rgba(224, 79, 96, 0.6); }
            100% { box-shadow: 0 0 15px rgba(161, 29, 42, 0.4); }
        }

        .pulse-btn {
            animation: bloodMoonPulse 3s infinite ease-in-out; /* Smooth continuous breathing */
        }

        .menu-btn {
            background: #A11D2A; /* Blood Moon button */
            color: #E4E5E8;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }
        .menu-btn:hover {
            background: #E04F60; /* Eclipse Glow on hover */
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(224, 79, 96, 0.4);
        }

        /* --- 2C: MAIN APP LAYOUT --- */
        #photobooth-app {
            display: none; /* Hidden until Start is clicked */
            background: #252630; 
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #3a3c4a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.9);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }
        
        /* --- 2D: FILTER & SETTINGS BUTTONS --- */
        .filter-controls, .settings-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .filter-btn {
            background: #1b1c23;
            color: #9a9ca6;
            border: 1px solid #3a3c4a;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #A11D2A; 
            color: #E4E5E8;
            border-color: #A11D2A;
        }
        
        /* Utility class to flip the video horizontally */
        .mirrored {
            transform: scaleX(-1);
        }

        /* --- 2E: VIDEO FEED & TIMER DISPLAY --- */
        .video-container {
            position: relative; 
            display: inline-block;
            width: 100%;
        }
        video, img {
            width: 100%;
            border-radius: 8px;
            background: #000;
            border: 2px solid #3a3c4a;
            margin-bottom: 10px;
            box-sizing: border-box;
            transition: filter 0.3s ease; 
        }
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            font-size: 6rem;
            font-weight: bold;
            color: #E04F60; 
            text-shadow: 0 0 25px rgba(224, 79, 96, 0.9); 
            display: none; 
            z-index: 10;
        }
        
        /* --- 2F: ACTION BUTTONS & DOWNLOAD LINK --- */
        .controls {
            margin: 1rem 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-btn {
            background: #A11D2A; 
            color: #E4E5E8;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .action-btn:hover {
            background: #E04F60; 
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            background: #3a3c4a;
            color: #9a9ca6;
            cursor: not-allowed;
            transform: none;
        }
        .back-btn {
            background: transparent;
            color: #9a9ca6;
            border: 1px solid #9a9ca6;
        }
        .back-btn:hover {
            background: rgba(154, 156, 166, 0.1);
            color: #E4E5E8;
        }
        a.download-btn {
            display: none; 
            margin-top: 10px;
            color: #E4E5E8;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #E04F60;
            background: rgba(161, 29, 42, 0.2);
            padding: 10px 20px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        a.download-btn:hover {
            background: rgba(224, 79, 96, 0.4);
        }
        
        /* The hidden workspace where the image is drawn */
        canvas {
            display: none;
        }

        /* --- CUSTOM BLOOD MOON CURSOR --- */
        /* 1. Hide the default mouse pointer everywhere */
        body, button, a {
            cursor: none !important;
        }

        /* 2. Style the custom glowing ring */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border: 2px solid #E04F60; /* Eclipse Glow */
            border-radius: 50%;
            pointer-events: none; /* Prevents the cursor from blocking your clicks */
            transform: translate(-50%, -50%); /* Centers the ring exactly on the mouse coordinate */
            transition: width 0.2s, height 0.2s, background-color 0.2s, box-shadow 0.2s;
            z-index: 9999; /* Keeps it on top of everything */
            box-shadow: 0 0 10px rgba(224, 79, 96, 0.4);
        }

        /* 3. The hover effect when mousing over buttons */
        .custom-cursor.hovering {
            width: 35px;
            height: 35px;
            background-color: rgba(161, 29, 42, 0.2); /* Blood Moon tint inside the ring */
            box-shadow: 0 0 20px rgba(224, 79, 96, 0.8);
        }

    </style>
</head>
<body>

<div class="custom-cursor" id="custom-cursor"></div>

    <div id="main-menu">
        <h1 class="moon-title">QuackSnap</h1>
        <p class="welcome-text">The stage is set. Gather TNK dokyu, step into the light, and let's make some memories.</p>
        <button id="start-btn" class="menu-btn pulse-btn">Awaken Camera</button>
    </div>

    <div id="photobooth-app">   
        
        <div class="filter-controls"> 
            <button class="filter-btn active" data-filter="none">Normal</button>
            <button class="filter-btn" data-filter="grayscale(100%)">B&W</button>
            <button class="filter-btn" data-filter="sepia(100%)">Sepia</button>
            <button class="filter-btn" data-filter="contrast(150%) saturate(150%)">Vivid</button>
        </div>
        
        <div class="settings-controls">
            <button id="mirror-btn" class="filter-btn">🪞 Mirror: ON</button>
            <button id="mode-btn" class="filter-btn">📸 Mode: Single</button>
        </div>

        <div class="video-container"> 
            <video id="video" autoplay playsinline></video>
            <div id="countdown">3</div>
        </div>
        
        <div class="controls"> 
            <button id="back-btn" class="action-btn back-btn">Quit</button>
            <button id="snap" class="action-btn">Take Photo</button>
        </div>

        <canvas id="canvas"></canvas>
        
        <img id="photo" alt="Your photo will appear here">
        <br>
        <a id="download" class="download-btn">⬇️ Download Photo</a> 
    </div>

    <script>
        // --- 4A: DOM ELEMENT SELECTION ---
        // Hooking into the HTML elements so JS can control them
        const mainMenu = document.getElementById('main-menu');
        const photoboothApp = document.getElementById('photobooth-app');
        const startBtn = document.getElementById('start-btn');
        const backBtn = document.getElementById('back-btn');
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap');
        const photo = document.getElementById('photo');
        const downloadLink = document.getElementById('download');
        const countdownDisplay = document.getElementById('countdown');
        
        const filterBtns = document.querySelectorAll('.filter-btn');
        const mirrorBtn = document.getElementById('mirror-btn');
        const modeBtn = document.getElementById('mode-btn');

        // --- 4B: STATE VARIABLES ---
        // Remembers the current settings while the app runs
        let stream = null; 
        let currentFilter = 'none'; 
        let photoMode = 'single';
        
        // Mirror is ON by default for front-facing cameras
        let isMirrored = true; 
        video.classList.add('mirrored'); 

        // --- 4C: FILTER LOGIC ---
        // Applies CSS filters to the live video feed
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                video.style.filter = currentFilter;
            });
        });

        // --- 4D: SETTINGS LOGIC ---
        // Handles flipping the camera and switching capture modes
        mirrorBtn.addEventListener('click', () => {
            isMirrored = !isMirrored; 
            mirrorBtn.innerText = isMirrored ? "🪞 Mirror: ON" : "🪞 Mirror: OFF";
            video.classList.toggle('mirrored', isMirrored); 
        });

        modeBtn.addEventListener('click', () => {
            if (photoMode === 'single') {
                photoMode = 'strip';
                modeBtn.innerText = "🎞️ Mode: 4-Panel";
            } else {
                photoMode = 'single';
                modeBtn.innerText = "📸 Mode: Single";
            }
        });

        // --- 4E: NAVIGATION LOGIC ---
        // Handles moving between the Start Menu and the App
        startBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            photoboothApp.style.display = 'block';
            initCamera();
        });

        backBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop()); // Turn off hardware camera
            }
            photoboothApp.style.display = 'none';
            mainMenu.style.display = 'block';
            photo.src = '';
            downloadLink.style.display = 'none';
        });

        // --- 4F: CAMERA INITIALIZATION ---
        // Requests permission and connects webcam to the video tag
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream; 
            } catch (err) {
                console.error("Error accessing camera: ", err);
                alert("Could not access the camera. Please allow permissions.");
            }
        }

        // --- 4G: IMAGE CAPTURE HELPER FUNCTIONS ---
        // A custom function that tells the code to pause for a specific number of milliseconds
        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        // Runs the 3-2-1 countdown animation
        async function runCountdown() {
            countdownDisplay.style.display = 'block';
            for (let i = 3; i > 0; i--) {
                countdownDisplay.innerText = i;
                await delay(1000); // Wait exactly 1 second
            }
            countdownDisplay.style.display = 'none';
        }

        // Captures a single frame and draws it at a specific vertical (Y) position
        function captureFrame(yOffset, width, height) {
            const context = canvas.getContext('2d');
            context.save(); 
            
            if (isMirrored) {
                context.translate(width, 0);
                context.scale(-1, 1);
            }
            
            context.filter = currentFilter;
            context.drawImage(video, 0, yOffset, width, height);
            context.restore(); 
        }

        // --- 4H: PHOTO BUTTON ROUTING (SINGLE VS 4-PANEL) ---
        snapBtn.addEventListener('click', async () => {
            // Lock the buttons so the user can't interrupt the sequence
            snapBtn.disabled = true;
            backBtn.disabled = true;
            
            const width = video.videoWidth;
            const height = video.videoHeight;

            if (photoMode === 'single') {
                // === SINGLE PHOTO MODE ===
                canvas.width = width;
                canvas.height = height;
                
                await runCountdown();
                captureFrame(0, width, height); // Draw at the very top (Y=0)
                
                // Export final single image
                const imageData = canvas.toDataURL('image/png');
                photo.src = imageData; 
                downloadLink.href = imageData;
                downloadLink.download = 'quacksnap-single.png';
                downloadLink.style.display = 'inline-block';

            } else if (photoMode === 'strip') {
                // === 4-PANEL STRIP MODE ===
                canvas.width = width;
                canvas.height = height * 4; // Make the canvas 4 times taller!
                
                const context = canvas.getContext('2d');
                context.fillStyle = '#050508'; // Paint the background Void Black
                context.fillRect(0, 0, canvas.width, canvas.height);

                // Run a loop exactly 4 times
                for (let i = 0; i < 4; i++) {
                    await runCountdown(); 
                    
                    // Calculate where to drop the photo (0, 1x height, 2x height, or 3x height)
                    const yPosition = i * height;
                    captureFrame(yPosition, width, height);
                    
                    // Show a live preview of the strip building up!
                    photo.src = canvas.toDataURL('image/png'); 
                    
                    // Give a 1-second breathing room before starting the next countdown
                    if (i < 3) {
                        await delay(1000); 
                    }
                }
                
                // Export the final compiled strip
                downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.download = 'quacksnap-strip.png';
                downloadLink.style.display = 'inline-block';
            }
            
            // Unlock the buttons when completely finished
            snapBtn.disabled = false;
            backBtn.disabled = false;
        });
        
        // --- 4I: CUSTOM CURSOR LOGIC ---
        const customCursor = document.getElementById('custom-cursor');

        // Track the mouse movement and lock the ring to it
        document.addEventListener('mousemove', (e) => {
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });

        // Add the glowing hover effect to all buttons and links
        const clickableElements = document.querySelectorAll('button, a');
        clickableElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                customCursor.classList.add('hovering');
            });
            el.addEventListener('mouseleave', () => {
                customCursor.classList.remove('hovering');
            });
        });

    </script>
</body>
</html>
